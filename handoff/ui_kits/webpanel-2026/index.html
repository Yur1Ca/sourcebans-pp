<style>
  html { scrollbar-gutter: stable; }
  body { font-feature-settings: "cv02","cv03","cv04","cv11"; }
  /* Custom scrollbar */
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: rgba(120,113,108,.25); border-radius: 6px; border: 2px solid transparent; background-clip: padding-box; }
  *::-webkit-scrollbar-thumb:hover { background: rgba(120,113,108,.4); border: 2px solid transparent; background-clip: padding-box; }

  /* Drawer slide */
  .drawer-enter { transform: translateX(100%); }
  .drawer-enter-active { transform: translateX(0); transition: transform .25s cubic-bezier(.4,0,.2,1); }
  .drawer-exit { transform: translateX(0); }
  .drawer-exit-active { transform: translateX(100%); transition: transform .2s cubic-bezier(.4,0,.2,1); }

  /* Skeleton shimmer */
  @keyframes shimmer { 0% { background-position: -200px 0 } 100% { background-position: calc(200px + 100%) 0 } }
  .skel { background: linear-gradient(90deg, rgb(244 244 245) 0, rgb(228 228 231) 40px, rgb(244 244 245) 80px); background-size: 200px 100%; animation: shimmer 1.4s linear infinite; }
  .dark .skel { background: linear-gradient(90deg, rgb(39 39 42) 0, rgb(63 63 70) 40px, rgb(39 39 42) 80px); background-size: 200px 100%; }

  /* Dialog/drawer backdrop */
  .backdrop-enter { opacity: 0 } .backdrop-enter-active { opacity: 1; transition: opacity .25s ease }

  [data-tweak-hide] { display: none !important; }

  /* Smooth focus rings everywhere */
  :focus-visible { outline: 2px solid #ea580c; outline-offset: 2px; border-radius: 4px; }

  /* Sidebar nav links — defined here so they're immune to Tailwind JIT timing
     when active state toggles between buttons */
  .sidebar-link { color: rgb(63 63 70); }
  .sidebar-link:hover { background: rgb(244 244 245); }
  .sidebar-link[data-active="true"] { background: rgb(24 24 27); color: rgb(255 255 255); }
  .sidebar-link[data-active="true"] .sidebar-count { background: rgba(255,255,255,0.18); color: rgb(255 255 255); }
  .sidebar-link .sidebar-count { background: rgb(244 244 245); color: rgb(113 113 122); }
  .dark .sidebar-link { color: rgb(212 212 216); }
  .dark .sidebar-link:hover { background: rgb(39 39 42); }
  .dark .sidebar-link[data-active="true"] { background: rgb(244 244 245); color: rgb(24 24 27); }
  .dark .sidebar-link[data-active="true"] .sidebar-count { background: rgba(24,24,27,0.18); color: rgb(24 24 27); }
  .dark .sidebar-link .sidebar-count { background: rgb(39 39 42); color: rgb(161 161 170); }
</style>
