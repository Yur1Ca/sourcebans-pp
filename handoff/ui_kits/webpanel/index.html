<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SourceBans++ Web Panel — UI Kit</title>
<link rel="icon" href="../../assets/favicon.ico">
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body {
    background: #bab5b2; color: #444;
    font-family: Verdana, Arial, Tahoma, "Trebuchet MS", sans-serif;
    font-size: 11px; line-height: 1.35;
    display: flex; flex-direction: column; min-height: 100vh;
  }
  #mainwrapper { flex: 1; width: 984px; margin: 0 auto; }
  #footer {
    background: #38322c; color: #919191; padding: 20px 0; text-align: center;
    margin-top: 40px; font-size: 11px;
  }
  a { color: #4d4742; text-decoration: none; transition: color .25s ease; }
  a:hover { color: #b05015; }
  .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  hr { border: 0; border-top: 1px solid #ddd; }
  /* Knock out default React button focus ring for visual purity */
  button { outline: none; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="TopTabs.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="ListTable.jsx"></script>
<script type="text/babel" src="AdminLayout.jsx"></script>
<script type="text/babel" src="Forms.jsx"></script>

<script type="text/babel">

// ============== Demo data ==============
const SERVERS = [
  { mod: 'TF2', os: 'L', vac: '✓', host: 'TF2 Romania | VS Saxton Hale | vsh.tf2.ro', players: '21/24', map: 'arena_well' },
  { mod: 'TF2', os: 'L', vac: '✓', host: 'TF2 Romania | Deathrun | dr.tf2.ro',       players: '24/24', map: 'dr_safety_first_final' },
  { mod: 'TF2', os: 'L', vac: '✓', host: 'TF2 Romania | TF2Ware | play.tf2.ro',      players: '3/24',  map: 'tf2ware2_a1' },
  { mod: 'TF2', os: 'L', vac: '✓', host: 'TF2 Romania | Deathmatch | dm.tf2.ro',     players: '28/28', map: 'dm_duel_ro_v3_beta' },
];

const BANS = [
  { date: '12-08-14 19:50', name: 'xXx_360 N0SC0P3R_xXx',     length: '2 hr',    _state: 'banned' },
  { date: '12-07-14 15:03', name: 'TheDayzHUNxdYOYO',          length: '1 wk',    _state: 'default' },
  { date: '12-07-14 11:45', name: '|R&H||R7H| Folli74',        length: '1 d (E)', _state: 'unbanned' },
  { date: '12-06-14 21:54', name: 'Danny™',                    length: 'Permanent', _state: 'permanent' },
  { date: '12-06-14 18:05', name: 'DwEd10',                    length: '10 min (E)', _state: 'unbanned' },
  { date: '12-06-14 18:02', name: 'Charger',                   length: '10 min', _state: 'banned' },
  { date: '12-05-14 10:34', name: 'VirGamer440',              length: '1 hr (E)', _state: 'unbanned' },
];

const BLOCKED = [
  { date: '12-08-14 19:50', name: 'xXx_360 N0SC0P3R_xXx' },
  { date: '12-07-14 15:43', name: 'TheDayzHUNxdYOYO' },
  { date: '12-07-14 15:43', name: 'robert[b-c.hat 1 ref pure]' },
  { date: '12-07-14 12:07', name: '|R&H||R7H| Folli74' },
  { date: '12-07-14 00:50', name: 'MindQQIQQ™' },
  { date: '12-06-14 18:05', name: 'DwEd10' },
];

// ============== Pages ==============
function DashboardPage({ go }) {
  return (
    <>
      <PageTitle title="Dashboard" crumbs={['Home', 'Dashboard']} />
      <SectionHeader right="Server status">Active Servers</SectionHeader>
      <ListTable
        columns={[
          { key: 'mod', label: 'Mod', width: 50, render: (r) => <ModIcon mod={r.mod} /> },
          { key: 'os',  label: 'OS',  width: 30, render: (r) => <span title="Linux">🐧</span> },
          { key: 'vac', label: 'VAC', width: 40 },
          { key: 'host', label: 'Hostname' },
          { key: 'players', label: 'Players', width: 80 },
          { key: 'map', label: 'Map', width: 220 },
        ]}
        rows={SERVERS}
      />
      <div style={{ height: 24 }} />
      <div className="row-grid">
        <div>
          <SectionHeader right={<>Total bans: <b>1096</b></>}>Latest Added Bans</SectionHeader>
          <ListTable
            columns={[
              { key: 'mod', label: 'Mod', width: 36, render: () => <ModIcon mod="TF2" small /> },
              { key: 'date', label: 'Date / Time', width: 120 },
              { key: 'name', label: 'Name' },
              { key: 'length', label: 'Length', width: 90 },
            ]}
            rows={BANS}
            onRowClick={() => go('banlist')}
          />
        </div>
        <div>
          <SectionHeader right={<>Total stopped: <b>1964</b></>}>Latest Players Blocked</SectionHeader>
          <ListTable
            columns={[
              { key: 'i', label: '', width: 24, render: () => <span style={{ color: '#e80909' }}>●</span> },
              { key: 'date', label: 'Date / Time', width: 120 },
              { key: 'name', label: 'Name' },
            ]}
            rows={BLOCKED}
          />
        </div>
      </div>
    </>
  );
}

function ModIcon({ mod = 'TF2', small }) {
  const sz = small ? 14 : 18;
  return (
    <span style={{
      display: 'inline-block', width: sz, height: sz, background: '#c2956b',
      borderRadius: 2, color: '#fff', fontSize: small ? 8 : 10,
      textAlign: 'center', lineHeight: `${sz}px`, fontWeight: 700,
    }}>{mod.slice(0, 2)}</span>
  );
}

function BanListPage() {
  return (
    <>
      <PageTitle title="Ban List" crumbs={['Home', 'Ban List']} />
      <Card>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
          <span><b>1096</b> bans across 4 servers</span>
          <span style={{ flex: 1 }} />
          <SelectInput style={{ width: 140 }}>
            <option>Filter: All</option><option>Permanent</option><option>Active</option><option>Expired</option>
          </SelectInput>
          <Btn kind="refresh">Refresh</Btn>
        </div>
        <ListTable
          columns={[
            { key: 'mod', label: 'Mod', width: 50, render: () => <ModIcon mod="TF2" /> },
            { key: 'date', label: 'Date / Time', width: 130 },
            { key: 'name', label: 'Player' },
            { key: 'authid', label: 'SteamID', width: 180,
              render: () => <span style={{ fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 10 }}>STEAM_0:1:12345678</span> },
            { key: 'length', label: 'Length', width: 100 },
            { key: 'admin', label: 'Admin', width: 100, render: () => 'IceMan' },
          ]}
          rows={BANS}
        />
        <div style={{ marginTop: 10, color: '#4d4742', fontSize: 11 }}>
          Page 1 of 110 &nbsp;·&nbsp; <a>« First</a> <a>‹ Prev</a> <a>Next ›</a> <a>Last »</a>
        </div>
      </Card>
    </>
  );
}

function ServersPage() {
  return (
    <>
      <PageTitle title="Servers" crumbs={['Home', 'Servers']} />
      <Card>
        <ListTable
          columns={[
            { key: 'mod', label: 'Mod', width: 50, render: () => <ModIcon mod="TF2" /> },
            { key: 'os', label: 'OS', width: 40, render: () => '🐧' },
            { key: 'vac', label: 'VAC', width: 40 },
            { key: 'host', label: 'Hostname' },
            { key: 'players', label: 'Players', width: 90 },
            { key: 'map', label: 'Map', width: 220 },
          ]}
          rows={SERVERS}
        />
      </Card>
    </>
  );
}

function ProtestPage() {
  return (
    <>
      <PageTitle title="Protest a Ban" crumbs={['Home', 'Protest a Ban']} />
      <Card>
        <SectionHeader>Submit a ban protest</SectionHeader>
        <Msg tone="amber" title="Read first.">Protests are not appeals. Provide your SteamID, the date of the ban, and a brief, factual reason. Abusive protests are deleted on sight.</Msg>
        <Field label="Your SteamID" required>
          <TextInput defaultValue="STEAM_0:1:00000000" />
        </Field>
        <Field label="Email">
          <TextInput placeholder="we will reply here" />
        </Field>
        <Field label="Reason for protest" required>
          <textarea style={{
            width: '100%', minHeight: 110, fontFamily: 'Verdana, sans-serif',
            fontSize: 13, padding: '6px 12px', border: '1px solid #ccc',
            borderRadius: 3, boxSizing: 'border-box', resize: 'vertical'
          }} placeholder="Be brief. Be factual. No insults." />
        </Field>
        <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
          <Btn kind="cancel">Discard</Btn>
          <Btn kind="ok">Submit Protest</Btn>
        </div>
      </Card>
    </>
  );
}

function AdminPage({ go }) {
  const [active, setActive] = React.useState('bans');
  return (
    <>
      <PageTitle title="Admin Panel" crumbs={['Home', 'Admin Panel', 'Bans']} />
      <AdminLayout active={active} onNav={setActive}>
        {active === 'bans' && (
          <>
            <SectionHeader right={<><b>1096</b> total &nbsp;·&nbsp; <b>284</b> active</>}>Manage Bans</SectionHeader>
            <div style={{ display: 'flex', gap: 8, marginBottom: 10 }}>
              <Btn kind="game">Add Ban</Btn>
              <Btn kind="refresh">Refresh</Btn>
              <span style={{ flex: 1 }} />
              <TextInput placeholder="Search SteamID, name, IP…" style={{ width: 240 }} />
            </div>
            <ListTable
              columns={[
                { key: 'mod', label: 'Mod', width: 40, render: () => <ModIcon mod="TF2" small /> },
                { key: 'date', label: 'Date', width: 120 },
                { key: 'name', label: 'Player' },
                { key: 'length', label: 'Length', width: 100 },
                { key: 'act', label: '', width: 90, render: () => (
                  <div style={{ display: 'flex', gap: 4 }}>
                    <a style={{ color: '#5885a2' }}>Edit</a>
                    <span>·</span>
                    <a style={{ color: '#b05015' }}>Unban</a>
                  </div>
                )},
              ]}
              rows={BANS}
            />
          </>
        )}
        {active === 'admins' && (
          <>
            <SectionHeader>Admins</SectionHeader>
            <Msg tone="green" title="Tip.">Admins are linked by SteamID; web access is controlled by group membership.</Msg>
            <ListTable
              columns={[
                { key: 'name', label: 'Name', render: (r) => r.name },
                { key: 'authid', label: 'SteamID', render: () => <span style={{ fontFamily: 'ui-monospace, Menlo, monospace', fontSize: 10 }}>STEAM_0:1:12345678</span> },
                { key: 'group', label: 'Group', width: 140 },
                { key: 'last', label: 'Last login', width: 140 },
              ]}
              rows={[
                { name: 'IceMan', group: 'Head Admin', last: '12-08-14 21:00' },
                { name: 'Galexrt', group: 'Senior Admin', last: '12-08-14 18:32' },
                { name: 'Groruk', group: 'Senior Admin', last: '12-08-14 11:04' },
                { name: 'Sarabveer', group: 'Admin', last: '12-07-14 22:18' },
              ]}
            />
          </>
        )}
        {active === 'servers' && (
          <>
            <SectionHeader>Game Servers</SectionHeader>
            <ListTable
              columns={[
                { key: 'mod', label: 'Mod', width: 50, render: () => <ModIcon mod="TF2" /> },
                { key: 'host', label: 'Hostname' },
                { key: 'players', label: 'Players', width: 80 },
                { key: 'map', label: 'Map', width: 220 },
                { key: 'act', label: '', width: 80, render: () => <a style={{ color: '#5885a2' }}>RCON</a> },
              ]}
              rows={SERVERS}
            />
            <div style={{ marginTop: 10 }}>
              <Btn kind="game">Add Server</Btn>
            </div>
          </>
        )}
        {active === 'settings' && (
          <>
            <SectionHeader>Settings</SectionHeader>
            <Field label="Site name">
              <TextInput defaultValue="TF2 Romania — SourceBans++" />
            </Field>
            <Field label="Default ban length">
              <SelectInput defaultValue="permanent">
                <option value="hour">1 hour</option>
                <option value="day">1 day</option>
                <option value="week">1 week</option>
                <option value="permanent">Permanent</option>
              </SelectInput>
            </Field>
            <Field label="Allow public ban submissions">
              <SelectInput><option>Yes</option><option>No</option></SelectInput>
            </Field>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              <Btn kind="cancel">Cancel</Btn>
              <Btn kind="save">Save Changes</Btn>
            </div>
          </>
        )}
        {!['bans','admins','servers','settings'].includes(active) && (
          <>
            <SectionHeader>{active}</SectionHeader>
            <Msg tone="blue" title="Empty stub.">This admin section is part of the kit but has no demo data wired up.</Msg>
          </>
        )}
      </AdminLayout>
    </>
  );
}

// ============== App shell ==============
function App() {
  const [route, setRoute] = React.useState('dashboard');
  const [user, setUser] = React.useState('IceMan');
  const [loggedIn, setLoggedIn] = React.useState(true);

  const go = (k) => {
    if (k === 'logout') { setLoggedIn(false); setRoute('dashboard'); return; }
    setRoute(k); window.scrollTo(0, 0);
  };

  if (!loggedIn) {
    return (
      <>
        <Header />
        <TopTabs active="" user="" onNav={() => {}} />
        <div id="mainwrapper" style={{ paddingTop: 20 }}>
          <PageTitle title="Login" crumbs={['Home', 'Login']} />
          <LoginCard onLogin={(u) => { setUser(u); setLoggedIn(true); setRoute('dashboard'); }} />
        </div>
        <div id="footer">SourceBans++ 1.8.0-dev · CC BY-NC-SA 3.0 · sbpp.github.io</div>
      </>
    );
  }

  return (
    <>
      <Header />
      <TopTabs active={route} user={user} onNav={go} />
      <div id="mainwrapper" style={{ paddingTop: 14 }}>
        {route === 'dashboard' && <DashboardPage go={go} />}
        {route === 'banlist'   && <BanListPage />}
        {route === 'servers'   && <ServersPage />}
        {route === 'submit'    && <SubmitBanForm onSubmitted={() => go('dashboard')} />}
        {route === 'protest'   && <ProtestPage />}
        {route === 'admin'     && <AdminPage go={go} />}
      </div>
      <div id="footer">SourceBans++ 1.8.0-dev · CC BY-NC-SA 3.0 · sbpp.github.io</div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
