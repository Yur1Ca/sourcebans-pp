<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SBPP — Admin icon set</title>
<style>
  html,body { margin:0; background:#fff; }
  body { font: 10px Verdana, Arial, sans-serif; color:#444; padding:14px; }
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap:14px; }
  .ico { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .ico img { width:32px; height:32px; }
  .ico span { font-family: ui-monospace, Menlo, monospace; font-size:9px; color:#666; }
</style></head>
<body>
<div class="grid">
  <div class="ico"><img src="../assets/admin/admins.png"><span>admins</span></div>
  <div class="ico"><img src="../assets/admin/bans.png"><span>bans</span></div>
  <div class="ico"><img src="../assets/admin/comms.png"><span>comms</span></div>
  <div class="ico"><img src="../assets/admin/groups.png"><span>groups</span></div>
  <div class="ico"><img src="../assets/admin/mods.png"><span>mods</span></div>
  <div class="ico"><img src="../assets/admin/servers.png"><span>servers</span></div>
  <div class="ico"><img src="../assets/admin/settings.png"><span>settings</span></div>
  <div class="ico"><img src="../assets/admin/your_account.png"><span>account</span></div>
  <div class="ico"><img src="../assets/admin/error.png"><span>error</span></div>
  <div class="ico"><img src="../assets/admin/warning.png"><span>warning</span></div>
  <div class="ico"><img src="../assets/admin/help.png"><span>help</span></div>
  <div class="ico"><img src="../assets/info.png" style="width:48px;height:48px"><span>info 48</span></div>
  <div class="ico"><img src="../assets/warning.png" style="width:48px;height:48px"><span>warn 48</span></div>
  <div class="ico"><img src="../assets/msg-bubble.png"><span>msg bubble</span></div>
</div>
</body></html>
