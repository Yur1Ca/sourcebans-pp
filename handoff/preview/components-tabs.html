<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SBPP — Tabs (top nav)</title>
<style>
  html,body { margin:0; background:#bab5b2; }
  body { font: 11px Verdana, Arial, sans-serif; color:#444; }
  .bar { background:#38322c; height:50px; display:flex; align-items:stretch; }
  .bar a { color:#eee; padding:0 16px; line-height:50px; font-weight:800; font-size:11px; text-transform:uppercase; text-decoration:none; letter-spacing:.04em; }
  .bar a.active, .bar a:hover { background:#2a2723; color:#fff; }
  .user { margin-left:auto; padding-right:14px; line-height:50px; color:#eee; font-weight:400; }
  .user b { color:#bd754b; }
  .logout { background:#b05015; color:#fff !important; padding:0 18px; }
  .crumb { padding: 12px 14px 14px; color:#4d4742; }
  .crumb .h { font-size:26px; }
  .crumb .b { font-size:12px; text-transform:uppercase; }
</style></head>
<body>
<div class="bar">
  <a class="active">Dashboard</a><a>Ban List</a><a>Servers</a><a>Submit a Ban</a><a>Protest a Ban</a><a>Admin Panel</a>
  <span class="user">Welcome, <b>IceMan</b></span><a class="logout">Logout</a>
</div>
<div class="crumb">
  <div class="h">Dashboard</div>
  <div class="b">» Home » Dashboard</div>
</div>
</body></html>
