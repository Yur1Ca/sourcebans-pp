<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SBPP — Spacing & radius</title>
<style>
  html,body { margin:0; background:#fff; }
  body { font: 11px Verdana, Arial, sans-serif; color:#444; padding:18px; }
  .row { display:flex; gap:24px; flex-wrap:wrap; }
  .tok { display:flex; flex-direction:column; align-items:flex-start; gap:6px; }
  .tok b { font-size:11px; }
  .tok small { font-family: ui-monospace, Menlo, monospace; color:#888; font-size:10px; }
  .box { background:#5885a2; }
  .pad { background:#e0e0e0; border:1px dashed #aaa; }
</style></head>
<body>
<div class="row" style="margin-bottom:18px">
  <div class="tok"><div class="box" style="width:30px;height:30px"></div><b>3px radius</b><small>--sb-radius-sm · buttons, inputs, file</small></div>
  <div class="tok"><div class="box" style="width:30px;height:30px;border-radius:3px"></div><b>3px applied</b><small>border-radius:3px</small></div>
  <div class="tok"><div class="box" style="width:30px;height:30px;border-radius:0"></div><b>0 radius</b><small>tabs, table heads, h2 dialog</small></div>
</div>
<div class="row">
  <div class="tok"><div class="pad" style="padding:4px;width:60px;height:14px"></div><b>4px</b><small>table cell pad-y</small></div>
  <div class="tok"><div class="pad" style="padding:6px;width:60px;height:14px"></div><b>6px</b><small>table row pad / login row</small></div>
  <div class="tok"><div class="pad" style="padding:8px;width:60px;height:14px"></div><b>8px</b><small>tooltip · login other-links</small></div>
  <div class="tok"><div class="pad" style="padding:10px;width:60px;height:14px"></div><b>10px</b><small>h3 / dialog body</small></div>
  <div class="tok"><div class="pad" style="padding:12px;width:60px;height:14px"></div><b>12px</b><small>login card</small></div>
  <div class="tok"><div class="pad" style="padding:16px;width:60px;height:14px"></div><b>16px</b><small>tab a side-pad</small></div>
  <div class="tok"><div class="pad" style="padding:20px;width:60px;height:14px"></div><b>20px</b><small>footer pad-y</small></div>
</div>
</body></html>
