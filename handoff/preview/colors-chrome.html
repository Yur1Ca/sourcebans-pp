<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SBPP — Color: Page & Chrome</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; background:#f3f3f3; }
  body { font: 11px/1.35 Verdana, Arial, sans-serif; color: var(--sb-fg-1); padding: 14px; }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { height: 96px; border:1px solid #ddd; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .sw .name { font-weight:700; font-size:11px; }
  .sw .hex  { font-family: ui-monospace, Menlo, monospace; font-size:10px; opacity:.85; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#bab5b2;color:#2a2723"><div class="name">page bg</div><div class="hex">#BAB5B2</div></div>
  <div class="sw" style="background:#38322c;color:#e6e6e6"><div class="name">tab bar / footer</div><div class="hex">#38322C</div></div>
  <div class="sw" style="background:#2a2723;color:#e6e6e6"><div class="name">tab active / table head</div><div class="hex">#2A2723</div></div>
  <div class="sw" style="background:#4f463e;color:#fff"><div class="name">admin rail</div><div class="hex">#4F463E</div></div>
  <div class="sw" style="background:#a69e97;color:#fff"><div class="name">h3 / front line</div><div class="hex">#A69E97</div></div>
  <div class="sw" style="background:#e0e0e0;color:#333;border:1px solid #ccc"><div class="name">card surface</div><div class="hex">#E0E0E0</div></div>
  <div class="sw" style="background:#eaebeb;color:#333;border:1px solid #ccc"><div class="name">soft row</div><div class="hex">#EAEBEB</div></div>
  <div class="sw" style="background:#dadfe1;color:#34495e"><div class="name">search bg</div><div class="hex">#DADFE1</div></div>
</div>
</body></html>
