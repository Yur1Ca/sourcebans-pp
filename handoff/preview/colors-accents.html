<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SBPP — Brand & Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; background:#f3f3f3; }
  body { font: 11px/1.35 Verdana, Arial, sans-serif; color: var(--sb-fg-1); padding: 14px; }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { height: 96px; border:1px solid #ddd; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; color:#fff; }
  .sw .name { font-weight:700; font-size:11px; }
  .sw .hex  { font-family: ui-monospace, Menlo, monospace; font-size:10px; opacity:.9; }
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#b05015"><div class="name">link hover · rust</div><div class="hex">#B05015</div></div>
  <div class="sw" style="background:#bd754b"><div class="name">user link</div><div class="hex">#BD754B</div></div>
  <div class="sw" style="background:#5885a2"><div class="name">primary blue</div><div class="hex">#5885A2</div></div>
  <div class="sw" style="background:#6d8bb4"><div class="name">info-header blue</div><div class="hex">#6D8BB4</div></div>
  <div class="sw" style="background:#3bafda"><div class="name">refresh cyan</div><div class="hex">#3BAFDA</div></div>
  <div class="sw" style="background:#7d4071"><div class="name">save plum</div><div class="hex">#7D4071</div></div>
  <div class="sw" style="background:#cf7336"><div class="name">cancel orange</div><div class="hex">#CF7336</div></div>
  <div class="sw" style="background:#4d4742"><div class="name">link rest</div><div class="hex">#4D4742</div></div>
</div>
</body></html>
