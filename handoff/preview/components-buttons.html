<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SBPP — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; background:#e0e0e0; }
  body { font: 11px Verdana, Arial, sans-serif; color:#444; padding: 18px; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px 14px; align-items:center; }
  .btn { font-family: Verdana, sans-serif; font-size:13px; color:#fff; border:1px solid; border-radius:3px; padding:6px 12px; cursor:default; transition: all .5s ease; display:inline-block; text-align:center; }
  .game{ background:#8cc152; border-color:#8cc152; }
  .game:hover { background:#a0d468; border-color:#a0d468; }
  .ok{ background:#729e42; border-color:#729e42; }
  .ok:hover { background:#558126; border-color:#558126; }
  .save{ background:#7d4071; border-color:#7d4071; }
  .cancel{ background:#cf7336; border-color:#cf7336; }
  .refresh{ background:#3bafda; border-color:#3bafda; }
  .refresh:hover { background:#4fc1e9; border-color:#4fc1e9; }
  .login{ background:#5885a2; border-color:#5885a2; text-transform:uppercase; padding:8px 12px; font-size:14px; }
  .lbl { font-family: ui-monospace, Menlo, monospace; font-size:10px; color:#777; }
</style></head>
<body>
<div class="grid">
  <span class="btn game">Add Server</span><span class="lbl">.btn .game · primary action</span><span class="lbl">#8CC152 → #A0D468</span>
  <span class="btn ok">Confirm</span><span class="lbl">.btn .ok · accept</span><span class="lbl">#729E42 → #558126</span>
  <span class="btn save">Save Changes</span><span class="lbl">.btn .save · commit</span><span class="lbl">#7D4071</span>
  <span class="btn cancel">Cancel</span><span class="lbl">.btn .cancel · dismiss</span><span class="lbl">#CF7336</span>
  <span class="btn refresh">Refresh</span><span class="lbl">.btn .refresh · reload</span><span class="lbl">#3BAFDA → #4FC1E9</span>
  <span class="btn login" style="width:240px">Log In</span><span class="lbl">.btn .login · uppercase, 100% w</span><span class="lbl">#5885A2</span>
</div>
</body></html>
