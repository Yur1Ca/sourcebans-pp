<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SBPP — Login card</title>
<style>
  html,body { margin:0; background:#bab5b2; }
  body { font: 11px Verdana, Arial, sans-serif; color:#444; padding:14px; }
  #login { width:305px; background:#e0e0e0; padding:12px; margin: 0 auto; box-sizing:content-box; }
  .logo { text-align:center; padding:8px 0; }
  .logo img { width:48px; height:48px; }
  label { display:block; font-size:11px; padding:6px 0 3px; }
  .loginmedium { width:278px; padding:6px 12px; font-size:18px; border:1px solid #ccc; border-radius:3px; box-sizing:border-box; }
  .row { padding:6px 0; }
  .other { border-top:1px solid #aaa9a9; padding:8px 0; margin-top:18px; text-align:center; }
  .other a { color:#4d4742; text-decoration:none; }
  .login { width:100%; text-transform:uppercase; background:#5885a2; border:1px solid #5885a2; color:#fff; padding:8px 12px; font-size:14px; border-radius:3px; }
</style></head>
<body>
<div id="login">
  <div class="logo"><img src="../assets/logo.png"></div>
  <div class="row"><label>Username</label><input class="loginmedium" value=""></div>
  <div class="row"><label>Password</label><input type="password" class="loginmedium"></div>
  <div class="row"><label><input type="checkbox"> Remember me</label></div>
  <div class="row"><button class="login">Log in</button></div>
  <div class="other"><a>Lost your password?</a></div>
</div>
</body></html>
