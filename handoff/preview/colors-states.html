<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SBPP — Banlist row states</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body { margin:0; background:#bab5b2; }
  body { font: 10px/1.35 Verdana, Arial, sans-serif; color: #000; padding: 14px; }
  table { width:100%; border-collapse:collapse; font-size:10px; }
  th { background:#2a2723; color:#e6e6e6; text-transform:uppercase; font-size:11px; padding:6px 10px; height:30px; text-align:left; }
  td { padding:6px 10px; }
  .r1 { background:#e0e0e0; }
  .ru { background:#c8f7c5; }
  .rp { background:#f1a9a0; }
  .rb { background:#fde3a7; }
  .pill { display:inline-block; padding:2px 6px; font-weight:700; font-size:9px; }
</style></head>
<body>
<table>
  <thead><tr><th>Date / Time</th><th>Name</th><th>Length</th><th>State</th></tr></thead>
  <tbody>
    <tr class="r1"><td>12-08-14 19:50</td><td>xXx_360 N0SC0P3R_xXx</td><td>2 hr</td><td><span class="pill">default · #E0E0E0</span></td></tr>
    <tr class="ru"><td>12-07-14 11:45</td><td>|R&amp;H|R7H| Folli74</td><td>1 d (E)</td><td><span class="pill">unbanned · #C8F7C5</span></td></tr>
    <tr class="rp"><td>12-06-14 21:54</td><td>Danny™</td><td>Permanent</td><td><span class="pill">permanent · #F1A9A0</span></td></tr>
    <tr class="rb"><td>12-06-14 18:02</td><td>Charger</td><td>10 min</td><td><span class="pill">banned · #FDE3A7</span></td></tr>
  </tbody>
</table>
</body></html>
