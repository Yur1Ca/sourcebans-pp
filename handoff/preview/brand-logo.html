<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SBPP — Logo & favicon</title>
<style>
  html,body { margin:0; background:#bab5b2; }
  body { font: 11px Verdana, Arial, sans-serif; color:#2a2723; padding:14px; display:flex; gap:18px; align-items:center; }
  .card { background:#e0e0e0; border:1px solid #ccc; padding:14px 16px; display:flex; align-items:center; gap:14px; }
  .card img.lg { width:70px; height:70px; }
  .card img.fav { width:32px; height:32px; image-rendering: pixelated; }
  .meta b { font-size:13px; }
  .meta small { display:block; font-family: ui-monospace, Menlo, monospace; color:#666; font-size:10px; margin-top:3px; }
</style></head>
<body>
<div class="card">
  <img class="lg" src="../assets/logo.png" alt="SBPP logo">
  <div class="meta"><b>SourceBans++ mark</b><small>assets/logo.png · slate &amp; lavender "S"</small></div>
</div>
<div class="card">
  <img class="fav" src="../assets/favicon.ico" alt="favicon">
  <div class="meta"><b>Favicon</b><small>assets/favicon.ico · 32×32 ICO</small></div>
</div>
</body></html>
