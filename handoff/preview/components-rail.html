<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SBPP — Admin rail</title>
<style>
  html,body { margin:0; background:#e0e0e0; }
  body { font: 11px Verdana, Arial, sans-serif; color:#444; padding:14px; display:flex; gap:14px; }
  .rail { width:200px; }
  .rail a { display:flex; align-items:center; gap:8px; height:32px; padding:0 10px; color:#fff; background:#4f463e; text-decoration:none; font-size:11px; transition: all .5s ease; }
  .rail a + a { margin-top:2px; }
  .rail a:hover, .rail a.active { background:#3d3631; }
  .rail img { width:18px; height:18px; }
  .desc { color:#444; font-size:11px; line-height:1.5; }
  .desc b { display:block; font-size:13px; color:#4d4742; margin-bottom:4px; }
</style></head>
<body>
<div class="rail">
  <a class="active"><img src="../assets/admin/admins.png" alt="">Admins</a>
  <a><img src="../assets/admin/bans.png" alt="">Bans</a>
  <a><img src="../assets/admin/comms.png" alt="">Comms</a>
  <a><img src="../assets/admin/groups.png" alt="">Groups</a>
  <a><img src="../assets/admin/mods.png" alt="">Mods</a>
  <a><img src="../assets/admin/servers.png" alt="">Servers</a>
  <a><img src="../assets/admin/settings.png" alt="">Settings</a>
  <a><img src="../assets/admin/your_account.png" alt="">Your Account</a>
</div>
<div class="desc">
  <b>#admin-page-menu</b>
  20% width left rail. Items are 32px tall, no radius, no border. Background <code>#4f463e</code> → <code>#3d3631</code> on hover. Icons are 32×32 raster PNGs (Vista era) — never substitute with vector icons.
</div>
</body></html>
