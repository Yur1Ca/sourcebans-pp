<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SBPP — Dialog headers + inline messages</title>
<style>
  html,body { margin:0; background:#bab5b2; }
  body { font: 11px Verdana, Arial, sans-serif; color:#444; padding:14px; }
  h2 { color:#fff; font-size:14px; font-weight:700; margin:0 0 8px; padding:4px 10px 5px; display:flex; align-items:center; }
  h2 .ico { width:18px; height:18px; margin-right:8px; display:inline-block; }
  .err  { background:#b46d6d; border:1px solid #983b3b; }
  .info { background:#6d8bb4; border:1px solid #3b6298; }
  .warn { background:#b4ae6d; border:1px solid #887a2c; }
  .ok   { background:#75b46d; border:1px solid #46983b; }
  .msg  { padding:8px; margin-bottom:8px; }
  .red  { background:#fefad3; border:1px solid #e80909; color:#e80909; }
  .grn  { background:#fcf7c9; border:1px solid #339933; color:#339933; }
  .blu  { background:#fcf7c9; border:1px solid #0066ff; color:#0066ff; }
  .amb  { background:#ffdd87; border:1px solid #ffce54; color:#8a6d3b; }
  b { font-size:13px; }
</style></head>
<body>
<h2 class="err">Error</h2>
<h2 class="info">Information</h2>
<h2 class="warn">Warning</h2>
<h2 class="ok">OK</h2>
<div class="msg red"><b>Ban failed.</b> SteamID is malformed.</div>
<div class="msg grn"><b>Ban added.</b> Player will be kicked on next connect.</div>
<div class="msg amb"><b>Debug.</b> Server query timed out — retried.</div>
</body></html>
