name: Release

on:
  push:
    tags:
      - '*.*.*'

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Verify tag is semver
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' is not a valid semver version; release skipped."
            exit 1
          fi

  build-plugin:
    name: Build SourceMod plugin
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup SourcePawn compiler
        uses: rumblefrog/setup-sp@master
        with:
          version: '1.12.x'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile plugins
        working-directory: game/addons/sourcemod/scripting
        run: |
          for src in *.sp; do
            spcomp -i include -o "../plugins/${src%.sp}.smx" "$src"
          done

      - name: Create plugin package
        run: |
          pkg="sourcebans-pp-${GITHUB_REF_NAME}.plugin-only"
          mkdir -p "/tmp/${pkg}/common/addons/sourcemod/plugins"
          cp game/addons/sourcemod/plugins/*.smx "/tmp/${pkg}/common/addons/sourcemod/plugins/"
          cp -R game/addons/sourcemod/configs "/tmp/${pkg}/common/addons/sourcemod/"
          cp -R game/addons/sourcemod/translations "/tmp/${pkg}/common/addons/sourcemod/"
          tar -C /tmp -czf "${pkg}.tar.gz" "${pkg}"

      - uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: sourcebans-pp-${{ github.ref_name }}.plugin-only.tar.gz
          if-no-files-found: error

  build-webpanel:
    name: Package webpanel
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Create webpanel package
        run: |
          pkg="sourcebans-pp-${GITHUB_REF_NAME}.webpanel-only"
          cp -R web "/tmp/${pkg}"
          cat > "/tmp/${pkg}/configs/version.json" <<EOF
          {
              "version": "${GITHUB_REF_NAME}",
              "git": "$(git rev-parse --short HEAD)",
              "dev": false
          }
          EOF
          (cd /tmp && zip -rq "${GITHUB_WORKSPACE}/${pkg}.zip" "${pkg}")

      - uses: actions/upload-artifact@v4
        with:
          name: webpanel
          path: sourcebans-pp-${{ github.ref_name }}.webpanel-only.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build-plugin, build-webpanel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            assets/sourcebans-pp-${{ github.ref_name }}.plugin-only.tar.gz
            assets/sourcebans-pp-${{ github.ref_name }}.webpanel-only.zip
