name: Release

on:
  push:
    tags:
      - '*.*.*'

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - name: Verify tag is semver
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' is not a valid semver version; release skipped."
            exit 1
          fi

  build-plugin:
    name: Build SourceMod plugin
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup SourcePawn compiler
        uses: rumblefrog/setup-sp@master
        with:
          version: '1.12.x'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile plugins
        working-directory: game/addons/sourcemod/scripting
        run: |
          for src in *.sp; do
            spcomp -i include -o "../plugins/${src%.sp}.smx" "$src"
          done

      - name: Create plugin package
        run: |
          pkg="sourcebans-pp-${GITHUB_REF_NAME}.plugin-only"
          mkdir -p "/tmp/${pkg}/common/addons/sourcemod/plugins"
          cp game/addons/sourcemod/plugins/*.smx "/tmp/${pkg}/common/addons/sourcemod/plugins/"
          cp -R game/addons/sourcemod/configs "/tmp/${pkg}/common/addons/sourcemod/"
          cp -R game/addons/sourcemod/translations "/tmp/${pkg}/common/addons/sourcemod/"
          tar -C /tmp -czf "${pkg}.tar.gz" "${pkg}"

      - uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: sourcebans-pp-${{ github.ref_name }}.plugin-only.tar.gz
          if-no-files-found: error

  build-webpanel:
    name: Package webpanel
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # Composer is run against the staged tree (NOT the source checkout)
      # so the source checkout stays clean and the resulting vendor/
      # tree carries production-only deps with the optimized autoloader
      # the release zip ships. See issue #1332 — pre-fix the release zip
      # omitted vendor/ entirely (it's gitignored), so unzipping a
      # tarball + visiting /install/ hard-failed on init.php's
      # autoload check ("Compose autoload not found! Run `composer
      # install`"). The docs site (Quickstart + the per-version upgrade
      # pages under updating/) promises vendor/ ships in the release
      # tarball; this step honours that promise.
      - name: Setup PHP + Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer
          coverage: none

      - name: Create webpanel package
        run: |
          pkg="sourcebans-pp-${GITHUB_REF_NAME}.webpanel-only"
          cp -R web "/tmp/${pkg}"
          cat > "/tmp/${pkg}/configs/version.json" <<EOF
          {
              "version": "${GITHUB_REF_NAME}",
              "git": "$(git rev-parse --short HEAD)",
              "dev": false
          }
          EOF
          composer install \
              --working-dir="/tmp/${pkg}" \
              --no-dev \
              --optimize-autoloader \
              --no-interaction \
              --prefer-dist
          (cd /tmp && zip -rq "${GITHUB_WORKSPACE}/${pkg}.zip" "${pkg}")

      # Smoke-check the actual zip (not the staged tree) so a future
      # change that makes `zip` silently drop vendor/ — a stray
      # .zipignore, an exclusion flag, etc. — fails the build loudly
      # instead of shipping a broken artifact. Two anchor files:
      #   - includes/vendor/autoload.php — the file init.php gates on.
      #   - includes/vendor/smarty/smarty/src/Smarty.php — the highest-
      #     value transitive dep (templates won't render without it).
      #     This is the file that backs `use Smarty\Smarty;` in
      #     web/init.php via Smarty 5.x's PSR-4 autoload (`Smarty\` =>
      #     `src/`); the legacy libs/Smarty.class.php is only a back-
      #     compat shim for non-composer callers, which the panel isn't.
      - name: Verify vendor/ is bundled in the zip
        run: |
          pkg="sourcebans-pp-${GITHUB_REF_NAME}.webpanel-only"
          missing=0
          for f in \
              "${pkg}/includes/vendor/autoload.php" \
              "${pkg}/includes/vendor/smarty/smarty/src/Smarty.php"; do
              if ! unzip -l "${pkg}.zip" "${f}" >/dev/null 2>&1; then
                  echo "::error::Missing required artifact file in ${pkg}.zip: ${f}"
                  missing=1
              fi
          done
          if [ "$missing" -ne 0 ]; then
              echo "::error::Webpanel zip is missing bundled composer dependencies; release would ship broken to self-hosters."
              exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: webpanel
          path: sourcebans-pp-${{ github.ref_name }}.webpanel-only.zip
          if-no-files-found: error

  release:
    name: Publish release
    needs: [build-plugin, build-webpanel]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            assets/sourcebans-pp-${{ github.ref_name }}.plugin-only.tar.gz
            assets/sourcebans-pp-${{ github.ref_name }}.webpanel-only.zip
