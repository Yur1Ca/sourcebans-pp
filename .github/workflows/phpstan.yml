name: PHPStan

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'
      - '.github/workflows/phpstan.yml'
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/phpstan.yml'

jobs:
  phpstan:
    name: Static analysis (theme=${{ matrix.theme }})
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: web

    # During the v2.0.0 theme rollout (#1123) we ship two coexistent
    # themes — the legacy `default/` bundle and the new `sbpp2026/`
    # incrementally being redesigned per-page. SmartyTemplateRule only
    # scans the active theme, so without this matrix new template/View
    # drift in `sbpp2026/` would only surface at D1's hard cutover.
    # The matrix collapses back to a single run when D1 deletes
    # `sbpp2026/` and renames it into `default/` (see plan A2 + D1).
    strategy:
      fail-fast: false
      matrix:
        theme:
          - default
          - sbpp2026

    # Schema-only MariaDB so phpstan-dba (#1100) can introspect column types.
    # Mirrors test.yml's service block deliberately — same image, same creds —
    # so a contributor's mental model of "MariaDB lives at 127.0.0.1:3306" works
    # for both jobs.
    services:
      mariadb:
        image: mariadb:10.11
        ports:
          - 3306:3306
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: sourcebans
          MARIADB_USER: sourcebans
          MARIADB_PASSWORD: sourcebans
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_mysql, openssl, gmp, mbstring, sodium
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('web/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist --no-interaction

      - name: Wait for MariaDB
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -proot --silent; then
              echo "ready"; exit 0
            fi
            sleep 2
          done
          echo "MariaDB never came up" >&2; exit 1

      # phpstan-dba doesn't execute queries, but it does call
      # information_schema for column metadata, so the schema needs to be
      # loaded against the same DB the bootstrap connects to. Render the
      # `{prefix}` / `{charset}` placeholders the same way docker/db-init
      # does locally so we can't drift.
      - name: Render and load schema for phpstan-dba
        run: |
          tmp=$(mktemp)
          sed -e 's/{prefix}/sb/g' -e 's/{charset}/utf8mb4/g' \
              install/includes/sql/struc.sql > "$tmp"
          mysql -h 127.0.0.1 -u root -proot sourcebans < "$tmp"
          # Sanity check: a known table should now exist.
          mysql -h 127.0.0.1 -u root -proot sourcebans -e 'SHOW TABLES LIKE "sb_admins"' \
            | grep -q sb_admins

      - name: Run PHPStan
        env:
          DBA_HOST: 127.0.0.1
          DBA_PORT: 3306
          DBA_NAME: sourcebans
          DBA_USER: sourcebans
          DBA_PASS: sourcebans
          DBA_PREFIX: sb
          DBA_CHARSET: utf8mb4
          # The whole point of the new MariaDB service is to gate schema drift.
          # Refuse to run if the bootstrap can't connect — otherwise a creds
          # mismatch would silently disable phpstan-dba and CI would stay green.
          DBA_REQUIRE: '1'
          # Tells SmartyTemplateRule which theme directory to scan (see
          # the rule's class-level docblock + plan A2). The default scan
          # is `web/themes/default/`; this matrix also runs against
          # `web/themes/sbpp2026/` so per-page PRs catch View ↔ template
          # drift in the new theme during the rollout window.
          SBPP_PHPSTAN_THEME: ${{ matrix.theme }}
        # The sbpp2026 leg uses phpstan-sbpp2026.neon (which inherits
        # phpstan.neon) so it can disable reportUnmatchedIgnoredErrors —
        # see that file's header for the why. D1 deletes both the
        # override config and this matrix step.
        run: includes/vendor/bin/phpstan analyse --configuration=${{ matrix.theme == 'sbpp2026' && 'phpstan-sbpp2026.neon' || 'phpstan.neon' }} --no-progress --error-format=github --memory-limit=1G
